name: build-and-push-docker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/iptv-balance
          tags: |
            # branch main -> :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # git sha -> :sha-<short>
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            # tag v1.0.2 -> :1.0.2, :1.0, :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=IPTV Balance
            org.opencontainers.image.source=https://github.com/alexkuryshko/iptv-balance

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `${{ secrets.DOCKERHUB_USERNAME }}/iptv-balance:${{ steps.meta.outputs.version }}`

            ```bash
            docker run -d --name iptv-balance -p 80:80 \
              -v iptv-data:/data --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/iptv-balance:${{ steps.meta.outputs.version }}
            ```
